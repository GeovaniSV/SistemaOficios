services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apiOficios/Dockerfile
    ports:
      - "3333:3333"
    env_file:
      - ./apiOficios/.env

  pdfworker:
    build:
      context: .
      dockerfile: pdfWorker/Dockerfile
    env_file:
      - ./pdfWorker/.env
    volumes:
      - ./pdfs:/app/pdfs
    depends_on:
      rabbitmq:
        condition: service_healthy

  emailworker:
    build:
      context: .
      dockerfile: emailWorker/Dockerfile
    env_file:
      - ./emailWorker/.env
    volumes:
      - ./pdfs:/app/pdfs
    depends_on:
      rabbitmq:
        condition: service_healthy
