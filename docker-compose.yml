services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./api:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "3333:3333"
    env_file:
      - ./api/.env

  pdfworker:
    build:
      context: .
      dockerfile: pdfWorker/Dockerfile
    env_file:
      - ./pdfWorker/.env
    volumes:
      - ./pdfs:/app/pdfs
    depends_on:
      rabbitmq:
        condition: service_healthy

  emailworker:
    build:
      context: .
      dockerfile: emailWorker/Dockerfile
    env_file:
      - ./emailWorker/.env
    volumes:
      - ./pdfs:/app/pdfs
    depends_on:
      rabbitmq:
        condition: service_healthy
