services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./api:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file:
      - ./api/.env
    depends_on:
      mysql:
        condition: service_healthy

  pdfworker:
    build:
      context: .
      dockerfile: pdfWorker/Dockerfile
    env_file:
      - ./pdfWorker/.env
    volumes:
      - ./pdfs:/app/pdfs
    depends_on:
      rabbitmq:
        condition: service_healthy

  emailworker:
    build:
      context: .
      dockerfile: emailWorker/Dockerfile
    env_file:
      - ./emailWorker/.env
    volumes:
      - ./pdfs:/app/pdfs
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  mysql_data:
